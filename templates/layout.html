<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Polity{% endblock %}</title>
  <link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>
  <div class="shell">
    <header class="masthead">
      <div>
        <a class="wordmark" href="/">Polity</a>
        <p class="tagline">Institutional drift, rendered round by round.</p>
      </div>
      <nav class="nav">
        <a href="/">Overview</a>
        <a href="/compare">Compare</a>
        <a href="/admin">Admin</a>
      </nav>
    </header>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
